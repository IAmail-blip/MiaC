<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" id="meta-theme-color" />
  <meta name="description" content="Tu lista de la compra inteligente, offline y siempre contigo." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="La Compra" />

  <title>La Compra Diaria</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0',
              300: '#6ee7b7', 400: '#34d399', 500: '#10b981',
              600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b'
            }
          },
          animation: {
            'fade-in':    'fadeIn .35s ease forwards',
            'slide-up':   'slideUp .3s ease forwards',
            'slide-down': 'slideDown .3s ease forwards',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
            'spin-slow':  'spin 1.8s linear infinite'
          },
          keyframes: {
            fadeIn:    { from: { opacity: '0' },                      to: { opacity: '1' } },
            slideUp:   { from: { opacity: '0', transform: 'translateY(16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { from: { opacity: '0', transform: 'translateY(-12px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            pulseSoft: { '0%,100%': { opacity: '1' }, '50%': { opacity: '.6' } }
          }
        }
      }
    };
  </script>

  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f8fafc;
      color: #0f172a;
      transition: background .25s, color .25s;
    }
    html.dark body { background: #0f172a; color: #f1f5f9; }

    /* ── Safe-area (iPhone notch/home-bar) ─────────────── */
    #app-shell {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #bottom-nav {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Splash ─────────────────────────────────────────── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(160deg, #065f46 0%, #0f172a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .5s ease, transform .5s ease;
    }
    #splash.hidden {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    #splash-cart {
      font-size: 5rem;
      filter: drop-shadow(0 8px 24px rgba(16,185,129,.5));
      animation: pulseSoft 1.8s ease-in-out infinite;
    }
    @keyframes pulseSoft {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.07); }
    }
    #splash-bar {
      width: 160px; height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 9999px;
      overflow: hidden;
      margin-top: 2rem;
    }
    #splash-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #34d399, #10b981);
      border-radius: 9999px;
      animation: loadBar 1.6s ease-in-out forwards;
    }
    @keyframes loadBar {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* ── Screens ─────────────────────────────────────────── */
    .screen { display: none; animation: fadeIn .25s ease forwards; }
    .screen.active { display: block; }

    /* ── Sub-pantalla de sección ─────────────────────────── */
    #sub-screen {
      position: fixed; inset: 0; z-index: 50;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    #sub-screen.open { transform: translateX(0); }

    /* ── Checkbox urgencia ───────────────────────────────── */
    .check-rojo   { --ring: #ef4444; }
    .check-amarillo { --ring: #f59e0b; }
    .check-verde  { --ring: #10b981; }
    .urgencia-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Bottom Sheet ────────────────────────────────────── */
    #sheet-overlay.open #sheet-backdrop { opacity: 1; }
    #sheet-box.open { transform: translateY(0) !important; }
    .duration-350 { transition-duration: 350ms; }

    /* ── Modal ───────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    #modal-overlay.open { display: flex; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 5.5rem; left: 50%; z-index: 200;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      transition: all .3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Nav activo ──────────────────────────────────────── */
    .nav-btn { transition: color .15s, transform .15s; }
    .nav-btn.active { color: #10b981; transform: translateY(-2px); }
    html.dark .nav-btn.active { color: #34d399; }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    html.dark ::-webkit-scrollbar-thumb { background: #334155; }

    /* ── Tap highlight ───────────────────────────────────── */
    * { -webkit-tap-highlight-color: transparent; }

    /* ── FAB ──────────────────────────────────────────────── */
    .fab {
      position: fixed; right: 1.25rem; z-index: 40;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 20px rgba(16,185,129,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer; border: none;
    }
    .fab:active { transform: scale(.93); box-shadow: 0 2px 8px rgba(16,185,129,.3); }
  </style>
</head>

<body class="flex flex-col h-full">

  <!-- ══════════════════════════════════════════════
       SPLASH SCREEN
  ══════════════════════════════════════════════ -->
  <div id="splash" role="status" aria-label="Cargando La Compra Diaria">
    <div id="splash-cart">🛒</div>
    <h1 class="mt-5 text-2xl font-bold text-white tracking-tight">La Compra Diaria</h1>
    <p class="mt-1 text-sm text-emerald-300 font-medium">Tu lista siempre contigo</p>
    <div id="splash-bar">
      <div id="splash-bar-fill"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       APP SHELL
  ══════════════════════════════════════════════ -->
  <div id="app-shell" class="flex flex-col flex-1 overflow-hidden" style="display:none;">

    <!-- ── Header ───────────────────────────────── -->
    <header id="main-header"
      class="flex items-center justify-between px-4 pt-3 pb-2 
             bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800
             sticky top-0 z-30">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🛒</span>
        <h1 id="header-title" class="text-base font-bold text-slate-800 dark:text-slate-100 leading-tight">
          La Compra Diaria
        </h1>
      </div>
      <div class="flex items-center gap-2">
        <!-- Indicador offline -->
        <span id="offline-badge"
          class="hidden text-xs font-semibold px-2 py-0.5 rounded-full
                 bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300">
          Sin conexión
        </span>
        <!-- Dark mode toggle rápido -->
        <button id="header-dark-toggle"
          class="w-8 h-8 rounded-full flex items-center justify-center
                 text-slate-500 dark:text-slate-400
                 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          aria-label="Cambiar modo oscuro">
          <span id="dark-icon">🌙</span>
        </button>
      </div>
    </header>

    <!-- ── Contenido Principal ─────────────────── -->
    <main id="main-content" class="flex-1 overflow-y-auto pb-2">

      <!-- PANTALLA: Modo Compra ─────────────────── -->
      <section id="screen-compra" class="screen active px-4 pt-4 pb-4 space-y-3">
        <!-- Renderizado por app.js -->
        <div id="compra-empty" class="hidden flex flex-col items-center justify-center py-20 text-center">
          <div class="text-6xl mb-4">✅</div>
          <p class="text-lg font-semibold text-slate-700 dark:text-slate-300">¡Todo listo!</p>
          <p class="text-sm text-slate-400 dark:text-slate-500 mt-1">No hay productos pendientes</p>
        </div>
        <div id="compra-list" class="space-y-2"></div>
      </section>

      <!-- PANTALLA: Categorías ──────────────────── -->
      <section id="screen-categorias" class="screen px-4 pt-4 pb-4">
        <div id="categorias-list" class="space-y-2"></div>
      </section>

      <!-- PANTALLA: Resumen ────────────────────── -->
      <section id="screen-resumen" class="screen px-4 pt-4 pb-4 space-y-4">
        <!-- Renderizado por app.js -->
        <div id="resumen-content"></div>
      </section>

      <!-- PANTALLA: Gestión ────────────────────── -->
      <section id="screen-gestion" class="screen px-4 pt-4 pb-4 space-y-4">
        <div id="gestion-content"></div>
      </section>

    </main>

    <!-- ── FAB (añadir producto / sección) ────── -->
    <button id="fab-add" class="fab" style="bottom:5.5rem;" aria-label="Añadir">
      <span class="text-white font-light" style="font-size:1.75rem;line-height:1;">＋</span>
    </button>

    <!-- ── Bottom Navigation ──────────────────── -->
    <nav id="bottom-nav"
      class="flex items-center justify-around
             bg-white dark:bg-slate-900
             border-t border-slate-100 dark:border-slate-800
             px-2 pt-2 pb-1 safe-bottom">

      <button class="nav-btn active flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl"
              data-tab="compra" aria-label="Modo Compra">
        <span class="text-xl">🛒</span>
        <span class="text-[10px] font-semibold">Compra</span>
      </button>

      <button class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl"
              data-tab="categorias" aria-label="Categorías">
        <span class="text-xl">📂</span>
        <span class="text-[10px] font-semibold">Secciones</span>
      </button>

      <button class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl"
              data-tab="resumen" aria-label="Resumen">
        <span class="text-xl">📊</span>
        <span class="text-[10px] font-semibold">Resumen</span>
      </button>

      <button class="nav-btn flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl"
              data-tab="gestion" aria-label="Gestión">
        <span class="text-xl">⚙️</span>
        <span class="text-[10px] font-semibold">Gestión</span>
      </button>
    </nav>
  </div>

  <!-- ══════════════════════════════════════════════
       SUB-PANTALLA (Productos de sección)
  ══════════════════════════════════════════════ -->
  <div id="sub-screen"
    class="bg-slate-50 dark:bg-slate-950 flex flex-col h-full">

    <header class="flex items-center gap-3 px-4 pt-4 pb-3
                   bg-white dark:bg-slate-900
                   border-b border-slate-100 dark:border-slate-800 sticky top-0 z-10">
      <button id="sub-back"
        class="w-9 h-9 rounded-full flex items-center justify-center
               text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
        aria-label="Volver">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4l-6 6 6 6"/>
        </svg>
      </button>
      <span id="sub-icon" class="text-2xl"></span>
      <h2 id="sub-title" class="text-base font-bold text-slate-800 dark:text-slate-100 flex-1 truncate"></h2>
    </header>

    <div id="sub-content" class="flex-1 overflow-y-auto px-4 pt-3 pb-28 space-y-2"></div>

    <!-- FAB en sub-pantalla -->
    <button id="fab-sub-add" class="fab" style="bottom:1.5rem;" aria-label="Añadir producto">
      <span class="text-white font-light" style="font-size:1.75rem;line-height:1;">＋</span>
    </button>
  </div>

  <!-- ══════════════════════════════════════════════
       BOTTOM SHEET (formularios CRUD)
  ══════════════════════════════════════════════ -->
  <div id="sheet-overlay"
    style="display:none;"
    class="fixed inset-0 z-[60] flex items-end justify-center"
    role="dialog" aria-modal="true" aria-labelledby="sheet-title">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm
                opacity-0 transition-opacity duration-300"
         id="sheet-backdrop"></div>

    <!-- Panel -->
    <div id="sheet-box"
      class="relative w-full max-w-lg
             bg-white dark:bg-slate-900
             rounded-t-2xl shadow-2xl
             translate-y-full transition-transform duration-350 ease-out
             max-h-[90dvh] flex flex-col"
      style="padding-bottom: env(safe-area-inset-bottom, 0px);">

      <!-- Handle -->
      <div class="flex justify-center pt-3 pb-1 flex-shrink-0">
        <div class="w-10 h-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
      </div>

      <!-- Title -->
      <div class="flex items-center justify-between px-5 py-3 flex-shrink-0
                  border-b border-slate-100 dark:border-slate-800">
        <h3 id="sheet-title" class="text-base font-bold text-slate-800 dark:text-slate-100"></h3>
        <button id="sheet-cancel-x"
          class="w-8 h-8 rounded-full flex items-center justify-center
                 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          aria-label="Cerrar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M3 3l10 10M13 3L3 13"/>
          </svg>
        </button>
      </div>

      <!-- Body (scrollable) -->
      <div id="sheet-body" class="flex-1 overflow-y-auto px-5 py-3"></div>

      <!-- Actions -->
      <div class="flex gap-3 px-5 py-4 flex-shrink-0
                  border-t border-slate-100 dark:border-slate-800">
        <button id="sheet-cancel"
          class="flex-1 py-3 rounded-xl text-sm font-bold
                 bg-slate-100 dark:bg-slate-800
                 text-slate-700 dark:text-slate-300
                 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          Cancelar
        </button>
        <button id="sheet-submit"
          class="flex-1 py-3 rounded-xl text-sm font-bold
                 bg-brand-500 text-white hover:bg-brand-600
                 active:scale-95 transition-all">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       MODAL GENÉRICO (confirmaciones)
  ══════════════════════════════════════════════ -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-box"
      class="w-full max-w-sm bg-white dark:bg-slate-800
             rounded-2xl shadow-2xl overflow-hidden animate-slide-up">
      <div class="px-5 pt-5 pb-4">
        <h3 id="modal-title" class="text-base font-bold text-slate-800 dark:text-slate-100 mb-1"></h3>
        <div id="modal-body" class="text-sm text-slate-600 dark:text-slate-300"></div>
      </div>
      <div id="modal-actions" class="flex gap-2 px-5 pb-5"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       TOAST
  ══════════════════════════════════════════════ -->
  <div id="toast"
    class="px-4 py-2 rounded-full bg-slate-800 dark:bg-slate-200
           text-white dark:text-slate-900 text-sm font-medium shadow-lg"
    role="status" aria-live="polite">
  </div>

  <!-- ══════════════════════════════════════════════
       APP JS
  ══════════════════════════════════════════════ -->
  <script src="./app.js"></script>
</body>
</html>
